name: Build Acode Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build release
        run: npm run build-release

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: rutex-conduit
          path: dist.zip
